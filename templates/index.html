<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excellent Camera</title>
    
    <!-- FIXED: Real Working Fonts and Icons -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --primary: #6366f1;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        body {
            margin: 0;
            background-color: var(--dark);
            color: var(--light);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 101;
        }

        .logo-placeholder {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .logo-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .video-container {
            position: relative;
            width: 92%;
            max-width: 500px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            border: 2px solid #334155;
            background: #000;
            aspect-ratio: 3/4; /* Keeps it looking like a phone camera */
        }

        video { display: none; }
        #display { width: 100%; height: 100%; object-fit: cover; display: block; }

        .controls {
            position: fixed;
            bottom: 30px;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            padding: 15px 20px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .btn {
            border: none;
            background: #334155;
            color: white;
            padding: 10px 15px;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            gap: 4px;
            min-width: 65px;
        }

        .btn i { font-size: 18px; }
        .btn:active { transform: scale(0.9); }
        .btn.active { background: var(--primary); box-shadow: 0 0 15px var(--primary); }
        .switch-btn { background: #f43f5e; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-placeholder">
            <img src="{{ url_for('static', filename='icon.png') }}" alt="Logo">
        </div>
        <h2 style="margin:0">Excellent <span style="color:var(--primary)">Camera</span></h2>
    </div>

    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="display" src="" alt="Waiting for camera...">
    </div>

    <div class="controls">
        <button class="btn active" id="btn-normal" onclick="changeMode('normal')">
            <i class="fas fa-video"></i>Normal
        </button>
        <button class="btn" id="btn-grey" onclick="changeMode('grey')">
            <i class="fas fa-ghost"></i>Grey
        </button>
        <button class="btn" id="btn-heatmap" onclick="changeMode('heatmap')">
            <i class="fas fa-fire"></i>Heat
        </button>
        <button class="btn switch-btn" onclick="switchCamera()">
            <i class="fas fa-sync-alt"></i>Flip
        </button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const display = document.getElementById('display');
        
        // FIXED: Define these variables at the start
        let currentStream = null;
        let currentFacingMode = 'user'; 

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            try {
                const constraints = { 
                    video: { facingMode: currentFacingMode } 
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
            } catch (err) {
                console.error("Camera error: ", err);
                alert("Camera access denied. Please use HTTPS and allow camera permissions.");
            }
        }

        function switchCamera() {
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            startCamera();
        }

        function changeMode(mode) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById('btn-' + mode);
            if(activeBtn) activeBtn.classList.add('active');
            fetch('/set_mode/' + mode);
        }

        function processFrame() {
            if (!video.videoWidth) {
                requestAnimationFrame(processFrame);
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            const dataUrl = canvas.toDataURL('image/jpeg', 0.4); // 0.4 compression for speed

            fetch('/process_frame', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataUrl })
            })
            .then(res => res.json())
            .then(data => {
                display.src = data.image;
                requestAnimationFrame(processFrame);
            })
            .catch(() => setTimeout(processFrame, 1000));
        }

        video.addEventListener('play', () => {
            processFrame();
        });
        
        startCamera();
    </script>
</body>
</html>
